version: "3.9"

services:
  api:
    build: .
    container_name: nexusflow-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    restart: unless-stopped

    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000

  celery:
    build: .
    container_name: nexusflow-celery

    env_file:
      - .env

    restart: unless-stopped

    command: >
      celery -A src.celery_app.celery_app worker --loglevel=info